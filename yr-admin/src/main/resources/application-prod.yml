# production profile（生产配置）安全基线
# author: PopoY
# date: 2026-04-01
# desc: 仅保留 prod profile（生产环境）的差异化配置，公共项统一收敛到 application.yml

spring:
  datasource:
    druid:
      master:
        # 生产环境保留独立主库默认值，避免误用开发库
        url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://127.0.0.1:3306/yr_template_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        basename: ${SPRING_DATASOURCE_DRUID_MASTER_BASENAME:yr_template_prod}

plc:
  task:
    # 生产环境启用定时任务
    enabled: true
