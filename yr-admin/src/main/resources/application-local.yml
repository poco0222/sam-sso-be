# application local 覆盖配置
# author: PopoY
# date: 2026-04-01
# desc: 仅保留 local profile（本地环境）的差异化配置，公共项统一收敛到 application.yml

yr:
  # 本地环境保留演示功能与本地上传目录
  demoEnabled: true
  profile: E:/ruoyi/uploadPath
  security:
    cors:
      allowed-origin-patterns: ${YR_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

logging:
  file:
    # 本地环境默认输出到固定 Windows 目录，便于直接查看日志
    path: ${LOGGING_FILE_PATH:C:/yr/logs}

spring:
  # 本地默认禁用 RocketMQ 自动装配，避免空壳模板启动时主动连接 MQ
  autoconfigure:
    exclude: org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration
  datasource:
    druid:
      master:
        url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://127.0.0.1:3306/local_sam_empty?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        username: ${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:root}
        password: ${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:}
        basename: ${SPRING_DATASOURCE_DRUID_MASTER_BASENAME:local_sam_empty}
      # local profile 下固定指向只读 source `local_sam`
      slave:
        enabled: true
        url: ${SPRING_DATASOURCE_DRUID_SLAVE_URL:jdbc:mysql://127.0.0.1:3306/local_sam?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        username: ${SPRING_DATASOURCE_DRUID_SLAVE_USERNAME:root}
        password: ${SPRING_DATASOURCE_DRUID_SLAVE_PASSWORD:}
  devtools:
    restart:
      # 本地环境开启热部署
      enabled: true

rocketmq:
  # 本地开发机默认连接内网 MQ 地址
  name-server: ${ROCKETMQ_NAME_SERVER:192.168.19.193:9876}

swagger:
  # 本地环境默认开启 swagger（接口文档）
  enabled: ${SWAGGER_ENABLED:true}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

sso:
  init-import:
    legacy-source-datasource: ${SSO_INIT_IMPORT_LEGACY_SOURCE_DATASOURCE:SLAVE}

file:
  # 本地环境固定落盘目录
  constantPath: ${FILE_CONSTANT_PATH:D:/yr/uploadPath}
