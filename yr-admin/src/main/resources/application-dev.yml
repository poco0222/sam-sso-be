# 项目相关配置#111
yr:
  # 名称
  name: Youngron
  # 版本
  version: 3.6.0
  # 版权年份
  copyrightYear: 2021
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置C:/yr/upload，Linux配置 /home/yr/upload）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 一期阶段通过应用配置固定控制验证码开关，避免依赖系统参数模块
  captcha:
    enabled: ${CAPTCHA_ENABLED:true}
  user:
    initPassword: ${YR_USER_INIT_PASSWORD:Init@123}
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: ${CAPTCHA_TYPE:math}
  security:
    cors:
      allowed-origin-patterns: ${YR_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:}

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: ${SERVER_PORT:8080}
  servlet:
    # 应用的访问路径
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/}
  undertow:
    # HTTP post内容的最大大小。当值为-1时，默认值为大小是无限的，可设置10M
    max-http-post-size: 10485760
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 512
    # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
    io-threads: 4
    # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
    # 默认等于 io-threads*8，它的值设置取决于系统的负载，可适当调大该值
    worker-threads: 128
    # 是否分配的直接内存
    direct-buffers: true
    #tomcat:
    # tomcat的URI编码
    #uri-encoding: UTF-8
    # tomcat最大线程数，默认为200
    #max-threads: 800
    # Tomcat启动初始化的线程数，默认值25
    #min-spare-threads: 30

# 日志配置
logging:
  level:
    com.yr: ${LOGGING_LEVEL:debug}
    org.springframework: ${LOGGING_LEVEL_SPRING_FRAMEWORK:warn}
  file:
    # 日志文件输出地址
    path: ${LOGGING_FILE_PATH:C:/yr/logs}
  # 指定配置文件
  config: classpath:logback-spring.xml

# Spring配置
spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      # 主库数据源
      master:
        url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://127.0.0.1:3306/yr_template_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        username: ${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:template_user}
        password: ${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD}
        host: ${SPRING_DATASOURCE_DRUID_MASTER_HOST:127.0.0.1}
        port: ${SPRING_DATASOURCE_DRUID_MASTER_PORT:3306}
        basename: ${SPRING_DATASOURCE_DRUID_MASTER_BASENAME:yr_template_dev}
      # 扩展 MySQL 从库数据源（按需启用）
      slave:
        enabled: false
        url: ${SPRING_DATASOURCE_DRUID_SLAVE_URL:jdbc:mysql://127.0.0.1:3306/yr_template_slave?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        username: ${SPRING_DATASOURCE_DRUID_SLAVE_USERNAME:template_user}
        password: ${SPRING_DATASOURCE_DRUID_SLAVE_PASSWORD}
      # 扩展 SQL Server 从库数据源（按需启用）
      slaveec:
        enabled: false
        driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
        url: ${SPRING_DATASOURCE_DRUID_SLAVEEC_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=template_db;encrypt=false}
        username: ${SPRING_DATASOURCE_DRUID_SLAVEEC_USERNAME:template_user}
        password: ${SPRING_DATASOURCE_DRUID_SLAVEEC_PASSWORD:template_password}
      # 扩展 SQL Server 从库数据源2（按需启用）
      slavexx:
        enabled: false
        driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
        url: ${SPRING_DATASOURCE_DRUID_SLAVEXX_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=template_db;encrypt=false}
        username: ${SPRING_DATASOURCE_DRUID_SLAVEXX_USERNAME:template_user}
        password: ${SPRING_DATASOURCE_DRUID_SLAVEXX_PASSWORD:template_password}
      # 初始连接数
      initialSize: 5
      # 最小连接池数量
      minIdle: 10
      # 最大连接池数量
      maxActive: 20
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      maxEvictableIdleTimeMillis: 900000
      # 配置检测连接是否有效
      #validationQuery: SELECT 1 FROM DUAL
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: ${DRUID_STAT_VIEW_SERVLET_ENABLED:false}
        # 设置白名单，不填则允许所有访问
        allow:
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: ${DRUID_STAT_VIEW_LOGIN_USERNAME:}
        login-password: ${DRUID_STAT_VIEW_LOGIN_PASSWORD:}
      filter:
        stat:
          enabled: true
          # 慢SQL记录
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
  liquibase:
    # 是否开启 liquibase 支持
    enabled: ${SPRING_LIQUIBASE_ENABLED:false}
    # 是否先删除数据库
    drop-first: false
    # master 文件
    change-log: classpath:/db/liquibase/master.xml
    # 上下文参数 https://docs.liquibase.com/concepts/advanced/contexts.html
    # contexts: development,test,production
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      #      max-file-size: 10MB
      max-file-size: 20000MB
      # 设置总上传的文件大小
      #      max-request-size: 20MB
      max-request-size: 20000MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: ${SPRING_REDIS_HOST:localhost}
    # 端口，默认为6379
    port: ${SPRING_REDIS_PORT:6379}
    # 数据库索引
    database: ${SPRING_REDIS_DATABASE:0}
    # 密码
    password: ${SPRING_REDIS_PASSWORD:}
    # 连接超时时间
    timeout: ${SPRING_REDIS_TIMEOUT:20s}
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  # 与security的bean冲突，直接允许覆盖
  main:
    allow-bean-definition-overriding: true
  jackson:
    # null值总是返回到前端，避免默认序列化策略吞掉显式空值。
    default-property-inclusion: always
# token配置
token:
  # 令牌自定义标识
  header: ${TOKEN_HEADER:Authorization}
  # 令牌密钥
  secret: ${TOKEN_SECRET}
  # 令牌有效期（默认30分钟）
  expireTime: ${TOKEN_EXPIRE_TIME:600}
  # 单点登录加密盐
  ssoSalt: ${TOKEN_SSO_SALT}
  # 是否需要检验用户名称与登录账号 Y/N
  ssoCheckName: ${TOKEN_SSO_CHECK_NAME:N}

# RocketMQ配置
rocketmq:
  enabled: ${ROCKETMQ_ENABLED:false}
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:yr-template-producer-group}
    send-message-timeout: ${ROCKETMQ_SEND_TIMEOUT:3000}
    retry-times-when-send-failed: ${ROCKETMQ_SEND_RETRY_TIMES:2}

# MyBatis配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.yr.**.domain,com.valin.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  # configLocation: classpath:mybatis/mybatis-config.xml
  global-config:
    db-config:
      # 主键自增
      id-type: auto
  configuration:
    # 全局映射器启用缓存
    cache-enabled: true
    # 允许 JDBC 支持自动生成主键
    use-generated-keys: true
    # 配置默认的执行器
    default-executor-type: reuse
    # 指定 MyBatis 所用日志的具体实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 驼峰式命名
    map-underscore-to-camel-case: true

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: ${SWAGGER_ENABLED:false}
  # 请求前缀
  pathMapping: ${SWAGGER_PATH_MAPPING:/dev-api}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 文件客户端
file:
  # 客户端类型: default, ftp
  clientType: ${FILE_CLIENT_TYPE:default}
  # 固定路径。如果使用了ftp服务，需要把这个值配置为空
  constantPath: ${FILE_CONSTANT_PATH:D:/yr/uploadPath}
  # ftp客户端配置，如果使用了ftp服务需要配置这里
  ftp:
    host: ${FILE_FTP_HOST:localhost}
    port: ${FILE_FTP_PORT:21}
    username: ${FILE_FTP_USERNAME:ftpuser}
    password: ${FILE_FTP_PASSWORD:1qazxsw2}


#plc驱动以及数采
plc:
  task:
    enabled: false  # 开发环境关闭定时任务

sso:
  init-import:
    # Phase 1 已明确当前 legacy source 默认来自 MySQL slave；若后续核实为 SQL Server，可显式改为 SLAVEEC / SLAVEXX。
    legacy-source-datasource: ${SSO_INIT_IMPORT_LEGACY_SOURCE_DATASOURCE:SLAVE}
