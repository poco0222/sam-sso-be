# application dev 覆盖配置
# author: PopoY
# date: 2026-04-01
# desc: 仅保留 dev profile（开发环境）的差异化配置，公共项统一收敛到 application.yml

yr:
  # 开发环境保留演示能力与开发上传目录
  demoEnabled: true
  profile: D:/ruoyi/uploadPath

logging:
  file:
    # 开发环境沿用固定日志目录，便于快速排查问题
    path: ${LOGGING_FILE_PATH:C:/yr/logs}

spring:
  datasource:
    druid:
      master:
        url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://127.0.0.1:3306/yr_template_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true}
        basename: ${SPRING_DATASOURCE_DRUID_MASTER_BASENAME:yr_template_dev}
  devtools:
    restart:
      # 开发环境开启热部署
      enabled: true

file:
  # 开发环境固定落盘目录
  constantPath: ${FILE_CONSTANT_PATH:D:/yr/uploadPath}
